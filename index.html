    <script>
      // Barvu pozadí (motiv oblohy) známe z minula – nastavíme ji na <html>
      // hned, ať preload i načtená appka mají stejnou barvu bez skoku. Když
      // motiv neznáme, odhadneme noc podle lokálního času.
      (function () {
        try {
          var sky = localStorage.getItem("sky");
          if (!sky) {
            var h = new Date().getHours();
            if (h < 6 || h >= 21) sky = "night";
          }
          if (sky) document.documentElement.dataset.sky = sky;
        } catch (e) {}
      })();
    </script>
    <style>
      /* Stejné pozadí (gradient) hned od prvního vykreslení jako u načtené
         appky – žádná změna barvy před skeletonem. Motiv (data-sky) na <html>
         se aplikuje přes :root[data-sky] body, shodně s index.css. */
      :root {
        color-scheme: dark;
      }
      html {
        background: #05080f;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(160deg, #05080f, #0a1120);
        background-attachment: fixed;
      }
      :root[data-sky="clear"] body {
        background: linear-gradient(160deg, #0d2a4d, #102f54 60%, #143f66);
      }
      :root[data-sky="cloud"] body {
        background: linear-gradient(160deg, #141b29, #1f2838);
      }
      :root[data-sky="rain"] body {
        background: linear-gradient(160deg, #0d141d, #18222e);
      }
      :root[data-sky="snow"] body {
        background: linear-gradient(160deg, #182032, #28324d);
      }
      :root[data-sky="night"] body {
        background: linear-gradient(160deg, #03060d, #080e1a);
      }
      /* Okamžitý skeleton ještě před spuštěním JS. Plně samostatné styly
         (v devu se index.css injektuje až přes JS), ať se skeleton zobrazí
         vždy správně. React ho po připojení nahradí vizuálně shodným skeletonem. */
      #boot,
      #boot * {
        box-sizing: border-box;
      }
      #boot {
        --px: clamp(12px, 3vw, 28px);
        position: relative;
        max-width: 1460px;
        margin: 0 auto;
        padding: 0 var(--px) 40px;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        letter-spacing: -0.003em;
        -webkit-font-smoothing: antialiased;
      }
      /* Déšť přes celý skeleton (stejný efekt jako .skel-rain v Reactu), aby
         pršelo hned při prvotním vykreslení, ještě než naběhne JS/React. Kapky
         doplní drobný inline skript níže. */
      #boot .b-rain {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 3;
      }
      #boot .b-raindrop {
        position: absolute;
        top: -32px;
        width: 2px;
        border-radius: 2px;
        background: linear-gradient(
          to bottom,
          rgba(130, 175, 255, 0),
          rgba(130, 175, 255, 0.45)
        );
        animation-name: b-rainfall;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        will-change: transform, opacity;
      }
      @keyframes b-rainfall {
        0% {
          transform: translateY(0);
          opacity: 0;
        }
        8% {
          opacity: var(--op, 0.6);
        }
        92% {
          opacity: var(--op, 0.6);
        }
        100% {
          transform: translateY(102vh);
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .b-rain {
          display: none;
        }
      }
      #boot .b-top {
        position: relative;
        /* Vlastní stacking context, aby se ::before (z-index:-1) vykreslil nad
           pozadím body a byl vidět. Zároveň nad deštěm (.b-rain z-index:3), ať
           kapky prší jen přes karty, ne přes hlavičku (stejně jako v Reactu). */
        z-index: 4;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: calc(12px + env(safe-area-inset-top, 0px)) 0 12px;
        margin-bottom: 12px;
      }
      /* Stejné frosted pozadí headeru přes celou šířku viewportu jako
         .topbar::before v index.css. */
      #boot .b-top::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: calc(50% - 50vw);
        right: calc(50% - 50vw);
        z-index: -1;
        background: rgba(6, 10, 18, 0.68);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        backdrop-filter: blur(18px) saturate(140%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      #boot .b-row1 {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      /* Výška 2. řádku odpovídá reálné větě „předpověď pro … na …"
         (0.92rem × line-height 1.55 ≈ 23px), ať header nemá jinou výšku než

      #boot .b-row2 {
        display: flex;
        align-items: center;
        /* Reálný 2. řádek obsahuje „pill" tlačítka (lokace/den) ~28px vysoká. */

      #boot .split {

      #boot .foot {

        gap: 12px;

      #boot .stats {

      #boot .btn {

      #boot .yrhead,

      #boot .dayhead {

      #boot .yrrow {

      /* Mobil: shodně s .app / .topbar v index.css (@media max-width:560px). */
      @media (max-width: 560px) {
        #boot {
          --px: 10px;
        }
        #boot .b-top {
          gap: 8px;
        }
      }
    </style>

    <script>
      // Déšť pro prvotní (boot) skeleton – vygeneruje kapky hned při parsování,
      // ještě než naběhne React. Částečně náhodné, stejně jako v Skeleton.tsx.
      (function () {
        var el = document.getElementById("b-rain");
        if (!el) return;
        try {
          if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        } catch (e) {}
        var n = 26,
          html = "";
        for (var i = 0; i < n; i++) {
          var base = (i / n) * 100;
          var left = Math.min(99, Math.max(0, base + (Math.random() - 0.5) * 9));
          var delay = (Math.random() * 2.4).toFixed(2);
          var dur = (0.8 + Math.random() * 1.3).toFixed(2);
          var h = Math.round(10 + Math.random() * 22);
          var op = (0.3 + Math.random() * 0.45).toFixed(2);
          html +=
            '<span class="b-raindrop" style="left:' +
            left.toFixed(2) +
            "%;height:" +
            h +
            "px;animation-delay:" +
            delay +
            "s;animation-duration:" +
            dur +
            "s;--op:" +
            op +
            '"></span>';
        }
        el.innerHTML = html;
      })();
    </script>
